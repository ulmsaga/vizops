server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3309/vizops?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: vizops1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  mail:
    host: localhost
    port: 1025
    username: ""
    password: ""
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

app:
  jwt:
    secret: "vizops-jwt-secret-key-for-production-must-be-long-enough-256bits"
    expiration: 86400000
  otp:
    expiry-minutes: 5
    from-email: noreply@vizops.dev
    from-name: VizOps

logging:
  level:
    dev.vizops: DEBUG
